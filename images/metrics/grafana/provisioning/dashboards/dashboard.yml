apiVersion: 1

providers:
  - name: 'vLLM Dashboards'
    orgId: 1
    folder: 'vLLM'       # This creates a folder in the Grafana UI containing your 2 dashboards
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      # This points to the internal directory inside the container.
      # Grafana will load ALL .json files found here.
      path: /etc/grafana/provisioning/dashboards
