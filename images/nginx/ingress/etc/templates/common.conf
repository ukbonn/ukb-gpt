map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ==============================================================================
# INTERNAL NGINX STATUS (Exporter-only)
# ------------------------------------------------------------------------------
# Dedicated internal listener used by nginx-prometheus-exporter.
# Not exposed via host port mappings; restricted to local/docker_internal clients.
server {
    listen 8080;
    server_name _;
    access_log off;

    allow 127.0.0.1;
    allow 172.16.0.0/12;
    deny all;

    location = /status {
        stub_status;
    }

    location = /health {
        return 200 "healthy\n";
    }

    location / {
        return 404;
    }
}
