services:
  # ============================================================================
  # LDAP EGRESS 
  # ============================================================================
  # ROLE: Sidecar Proxy.
  # CAPABILITY: The ONLY container connected to both the Isolated 'docker_internal' network
  #             and the routed 'dmz_egress' airlock network.
  # SECURITY:
  #   - Host firewall pins outbound traffic only to LDAP_TARGET_IP.
  #   - Nginx stream allow-lists only the frontend's fixed docker_internal IP.
  #   - Listener binds only on the docker_internal interface, not on dmz_egress.
  ldap_egress:
    extends:
      file: ./hardening.yml
      service: hardened_common
    build:
      context: ..
      dockerfile: images/nginx/ldap_egress/Dockerfile
      args:
        NGINX_LDAP_EGRESS_IMAGE: "${NGINX_LDAP_EGRESS_IMAGE:-nginx:alpine}"
    container_name: ukbgpt_ldap_egress
    environment:
      - "LDAP_TARGET_IP=${LDAP_TARGET_IP:?Error: LDAP_TARGET_IP must be set}"
      # Hostname expected by the upstream LDAPS certificate (used for SNI + name verification)
      - "LDAP_TARGET_SNI=${LDAP_TARGET_SNI:?Error: LDAP_TARGET_SNI must be set for LDAP}"
      - "LDAP_PROXY_CONNECT_TIMEOUT=${LDAP_PROXY_CONNECT_TIMEOUT:-5s}"
      - "LDAP_PROXY_TIMEOUT=${LDAP_PROXY_TIMEOUT:-20s}"
      ## hard coded
      # The IP we individually assign to the frontend
      - ALLOWED_CLIENT_IP=172.16.238.10 
      # Bind only on the internal interface, never on the routed egress NIC.
      - LDAP_LISTEN_IP=172.16.238.13
      # We force the target port to 636 (LDAPS) for TLS encrypted outward connection 
      - LDAP_TARGET_PORT=636 
      # The internal port we listen on 389 (LDAP)
      - LDAP_LISTEN_PORT=389
    volumes:
      # Mount the Hospital Root CA so Nginx can verify the AD Server
      - type: bind
        source: "${ROOT_CA_PATH:?Error: ROOT_CA_PATH must be set for LDAP}"
        target: /etc/nginx/certs/root_ca.crt
        read_only: true
    networks:
      docker_internal:
        # Reserved static identity on the isolated network.
        ipv4_address: 172.16.238.13
      dmz_egress:
    restart: on-failure
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
      - /etc/nginx/conf.d
      - /var/cache/nginx
      - /var/log/nginx
      - /run
