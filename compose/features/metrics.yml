services:
  # ============================================================================
  # MONITORING: Exporter (Passive Nginx metrics scrape)
  # ============================================================================
  exporter:
    extends:
      file: ./hardening.yml
      service: hardened_common
    build:
      context: ..
      dockerfile: images/metrics/exporter/Dockerfile
      args:
        NGINX_PROMETHEUS_EXPORTER_IMAGE: "${NGINX_PROMETHEUS_EXPORTER_IMAGE:-nginx/nginx-prometheus-exporter:1.3.0}"
        EXPORTER_RUNTIME_IMAGE: "${EXPORTER_RUNTIME_IMAGE:-alpine:3.19}"
    container_name: ukbgpt_exporter
    command: ["--nginx.scrape-uri=http://ingress:8080/status"]
    networks:
      - docker_internal
    read_only: true
    tmpfs:
      - /tmp

  # ============================================================================
  # MONITORING: Prometheus (Metric Collection)
  # ============================================================================
  # ROLE: Scrapes metrics from the vLLM backends and Nginx exporter.
  # SECURITY:
  #   - Runs entirely within the isolated 'docker_internal' network.
  #   - No ports exposed to host.
  prometheus:
    extends:
      file: ./hardening.yml
      service: hardened_common
    build:
      context: ..
      dockerfile: images/metrics/prometheus/Dockerfile
      args:
        PROMETHEUS_IMAGE: "${PROMETHEUS_IMAGE:-prom/prometheus:v2.45.0}"
        PROMETHEUS_RUNTIME_IMAGE: "${PROMETHEUS_RUNTIME_IMAGE:-alpine:3.19}"
    container_name: ukbgpt_prometheus
    environment:
      - "BACKEND_NODES=${BACKEND_NODES:-}"
    volumes:
      # Persist metric data
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - docker_internal
    restart: on-failure
    read_only: true
    tmpfs:
      - /tmp
      - /etc/prometheus:uid=65534,gid=65534,mode=755

  # ============================================================================
  # MONITORING: Grafana (Visualization)
  # ============================================================================
  # ROLE: Provides dashboards.
  # ACCESS: Accessed via Ingress proxy at https://<domain>/grafana/
  grafana:
    extends:
      file: ./hardening.yml
      service: hardened_common
    build:
      context: ..
      dockerfile: images/metrics/grafana/Dockerfile
      args:
        GRAFANA_IMAGE: "${GRAFANA_IMAGE:-grafana/grafana:10.0.0}"
    container_name: ukbgpt_grafana
    environment:
      # SUB-PATH ROUTING CONFIGURATION
      # We force the Root URL to match the external ingress (HTTPS)
      - SERVER_NAME=${SERVER_NAME:-localhost}
      - GF_SERVER_ROOT_URL=https://${SERVER_NAME:-localhost}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true

      # Security: disable anonymous access by default
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      # Provisioning: automatically add Prometheus as data source
      - ../images/metrics/grafana/provisioning:/etc/grafana/provisioning:ro
      # Persist dashboards and users
      - grafana-data:/var/lib/grafana
    networks:
      - docker_internal
    restart: on-failure
    read_only: true
    tmpfs:
      - /tmp

volumes:
  prometheus-data:
  grafana-data:
