[model]
id = "model.stt.google_gemma_4_e2b_it"
role = "stt"
title = "Google Gemma-4-E2B-it"
summary = "Compact Gemma 4 E2B multimodal STT adapter family for faster OpenAI-compatible audio transcription plus lightweight chat exposure."
base_compose_file = "compose/models/stt/google--gemma-4-e2b-it/base.yml"
base_service = "gemma4_e2b_stt_worker_template"
order = 19
wizard_enabled = true
accelerator = "nvidia"
supports_expert_parallel = false
expose_in_provider_api = true

[runtime]
command = [
  "--host=127.0.0.1",
  "--port=5001",
  "--model=google/gemma-4-E2B-it",
  "--max-model-len=${VLLM_STT_MAX_MODEL_LEN:-131072}",
  "--gpu-memory-utilization=${VLLM_STT_GPU_MEMORY_UTILIZATION:-0.85}",
  "--enable-auto-tool-choice",
  "--reasoning-parser=gemma4",
  "--tool-call-parser=gemma4",
  '--default-chat-template-kwargs={"enable_thinking":false}',
  "--enable-prefix-caching",
  '--limit-mm-per-prompt={"image":1,"audio":1,"video":1}',
  "--async-scheduling",
]
environment = { MULTIMODAL_STT_ADAPTER_PORT = "5000", MULTIMODAL_STT_INNER_PORT = "5001", MULTIMODAL_STT_SERVED_MODEL = "google/gemma-4-E2B-it", MULTIMODAL_STT_TRANSCRIPTION_MAX_TOKENS = "${MULTIMODAL_STT_TRANSCRIPTION_MAX_TOKENS:-2048}" }
default_vllm_openai_image = "vllm/vllm-openai:gemma4-cu130"
build_args = { VLLM_OPENAI_IMAGE = "${VLLM_OPENAI_IMAGE_STT:-vllm/vllm-openai:gemma4-cu130}", EXTRA_PIP_PACKAGES = "${VLLM_STT_EXTRA_PIP_PACKAGES:-av soxr librosa soundfile}" }
shm_size = "16gb"

[architectures.default]

[[variables]]
id = "VLLM_OPENAI_IMAGE_STT"
prompt_order = 10
prompt = true
description = "Worker image override for this Gemma E2B STT family."
examples = ["vllm/vllm-openai:gemma4-cu130"]

[[variables]]
id = "VLLM_STT_EXTRA_PIP_PACKAGES"
prompt_order = 20
prompt = false
description = "Optional additional pip packages for Gemma STT adapter image builds."
examples = ["av soxr librosa soundfile"]

[[variables]]
id = "VLLM_STT_GPU_MEMORY_UTILIZATION"
prompt_order = 30
prompt = true
description = "Optional GPU memory utilization fraction override for this STT family."
examples = ["0.85"]

[[variables]]
id = "VLLM_STT_MAX_MODEL_LEN"
prompt_order = 40
prompt = true
description = "Optional max model length override for this STT family."
examples = ["131072"]
