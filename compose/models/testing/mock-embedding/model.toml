[model]
id = "model.embedding.testing.mock"
role = "embedding"
title = "Testing Mock Embedding"
summary = "Internal test-only mock embedding family."
base_compose_file = "compose/models/testing/mock-embedding/base.yml"
base_service = "test_mock_embedding_worker_template"
order = 900
wizard_enabled = false
accelerator = "none"
supports_expert_parallel = false

[runtime]
command = ["python", "main.py", "--port=5000", "--model=dummy-embedding-model"]
build_args = { DUMMY_VLLM_WORKER_IMAGE = "${DUMMY_VLLM_WORKER_IMAGE:-python:3.11-slim}" }
shm_size = "16gb"

[architectures.default]
