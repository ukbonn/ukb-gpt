[model]
id = "model.llm.testing.mock"
role = "llm"
title = "Testing Mock LLM"
summary = "Internal test-only mock LLM family."
base_compose_file = "compose/models/testing/mock-llm/base.yml"
base_service = "test_mock_llm_worker_template"
order = 900
wizard_enabled = false
accelerator = "none"
supports_expert_parallel = false

[runtime]
command = ["python", "main.py", "--port=5000", "--model=dummy-model"]
build_args = { DUMMY_VLLM_WORKER_IMAGE = "${DUMMY_VLLM_WORKER_IMAGE:-python:3.11-slim}" }
shm_size = "16gb"

[architectures.default]
