[model]
id = "model.llm.qwen_qwen3_5_122b_a10b_fp8"
role = "llm"
title = "Qwen Qwen3.5-122B-A10B-FP8"
summary = "Large Qwen3.5 MoE FP8 family for standard multimodal serving with reasoning parser and MTP enabled."
base_compose_file = "compose/models/llm/qwen--qwen3.5-122b-a10b-fp8/base.yml"
base_service = "qwen3_5_122b_a10b_fp8_worker_template"
order = 25
wizard_enabled = true
accelerator = "nvidia"
supports_expert_parallel = false

[runtime]
command = [
  "--port=5000",
  "--host=0.0.0.0",
  "--model=Qwen/Qwen3.5-122B-A10B-FP8",
  "--reasoning-parser=qwen3",
  '--speculative-config={"method":"qwen3_next_mtp","num_speculative_tokens":1}',
  "--max-model-len=${VLLM_LLM_MAX_MODEL_LEN:-262144}",
  "--gpu-memory-utilization=${VLLM_LLM_GPU_MEMORY_UTILIZATION:-0.90}",
]
default_vllm_openai_image = "vllm/vllm-openai:nightly"
build_args = { VLLM_OPENAI_IMAGE = "${VLLM_OPENAI_IMAGE_LLM:-${VLLM_OPENAI_IMAGE:-vllm/vllm-openai:nightly}}" }
shm_size = "32gb"

[architectures.default]

[architectures.nvidia_ampere]

[[variables]]
id = "VLLM_OPENAI_IMAGE_LLM"
prompt_order = 5
prompt = true
description = "Worker image override for this LLM family. Use a Qwen3.5-compatible vLLM image."
examples = ["vllm/vllm-openai:nightly"]

[[variables]]
id = "VLLM_LLM_MAX_MODEL_LEN"
prompt_order = 10
prompt = true
description = "Optional max model length override for this model family."
examples = ["262144"]

[[variables]]
id = "VLLM_LLM_GPU_MEMORY_UTILIZATION"
prompt_order = 20
prompt = true
description = "Optional GPU memory utilization fraction override for this model family."
examples = ["0.90"]
