[model]
id = "model.llm.redhatai_gemma_4_31b_it_fp8_block"
role = "llm"
title = "Red Hat AI Gemma-4-31B-it-FP8_BLOCK"
summary = "Pre-quantized Gemma 4 31B FP8_BLOCK family for vLLM serving with image understanding, reasoning, and native tool calling. Defaults to a 128k context baseline with FP8 KV cache and a two-image multimodal limit for production-style deployments."
base_compose_file = "compose/models/llm/redhatai--gemma-4-31b-it-fp8-block/base.yml"
base_service = "gemma4_31b_fp8_block_worker_template"
order = 51
wizard_enabled = true
accelerator = "nvidia"
supports_expert_parallel = false

[runtime]
command = [
  "--port=5000",
  "--host=0.0.0.0",
  "--model=RedHatAI/gemma-4-31B-it-FP8_BLOCK",
  "--enable-auto-tool-choice",
  "--reasoning-parser=gemma4",
  "--tool-call-parser=gemma4",
  "--max-model-len=${VLLM_LLM_MAX_MODEL_LEN:-131072}",
  "--gpu-memory-utilization=${VLLM_LLM_GPU_MEMORY_UTILIZATION:-0.90}",
  '--limit-mm-per-prompt={"image":2,"audio":0}',
  "--async-scheduling",
]
default_vllm_openai_image = "vllm/vllm-openai:gemma4-cu130"
build_args = { VLLM_OPENAI_IMAGE = "${VLLM_OPENAI_IMAGE_LLM:-vllm/vllm-openai:gemma4-cu130}" }
shm_size = "16gb"

[architectures.default]

[[variables]]
id = "VLLM_OPENAI_IMAGE_LLM"
prompt_order = 10
prompt = true
description = "Worker image override for this LLM family. Use the Gemma 4-capable CUDA 13 vLLM image."
examples = ["vllm/vllm-openai:gemma4-cu130"]

[[variables]]
id = "VLLM_LLM_MAX_MODEL_LEN"
prompt_order = 20
prompt = true
description = "Optional max model length override for this model family."
examples = ["131072"]

[[variables]]
id = "VLLM_LLM_GPU_MEMORY_UTILIZATION"
prompt_order = 30
prompt = true
description = "Optional GPU memory utilization fraction override for this model family."
examples = ["0.90"]
