[schema]
version = 1
kind = "ukbgpt.env.schema"

[vars.BATCH_CLIENT_MODE_ON]
type = "bool"
default = "false"
secret = false
description = "Switch between chatbot provider mode (false) and batch client mode (true)."
examples = ["false", "true"]
validators = ["bool"]

[[vars.BATCH_CLIENT_MODE_ON.bindings]]
overlay = "base.runtime"
prompt_order = 130
prompt = false

[[vars.BATCH_CLIENT_MODE_ON.bindings]]
overlay = "mode.batch_client"
prompt_order = 10
prompt = false
required_when_all = ["mode:batch_client"]

[[vars.BATCH_CLIENT_MODE_ON.bindings]]
overlay = "mode.chatbot_provider"
prompt_order = 10
prompt = false
required_when_all = ["mode:chatbot_provider"]

[vars.BATCH_CLIENT_LISTEN_PORT]
type = "int"
default = "30000"
secret = false
description = "Localhost ingress port used in batch client mode."
examples = ["30000"]
validators = ["port"]

[[vars.BATCH_CLIENT_LISTEN_PORT.bindings]]
overlay = "base.runtime"
prompt_order = 140
prompt = true
applicable_when_all = ["mode:batch_client"]

[[vars.BATCH_CLIENT_LISTEN_PORT.bindings]]
overlay = "mode.batch_client"
prompt_order = 20
prompt = true
required_when_all = ["mode:batch_client"]

[vars.BATCH_CLIENT_DIRECT_PORT_START]
type = "int"
default = "30001"
secret = false
description = "Start of localhost direct worker port range in batch mode."
examples = ["30001"]
validators = ["port"]

[[vars.BATCH_CLIENT_DIRECT_PORT_START.bindings]]
overlay = "base.runtime"
prompt_order = 160
prompt = true
applicable_when_all = ["mode:batch_client"]

[[vars.BATCH_CLIENT_DIRECT_PORT_START.bindings]]
overlay = "mode.batch_client"
prompt_order = 30
prompt = true
applicable_when_all = ["mode:batch_client"]

[vars.BATCH_CLIENT_DIRECT_PORT_END]
type = "int"
default = "30032"
secret = false
description = "End of localhost direct worker port range in batch mode."
examples = ["30032"]
validators = ["port"]

[[vars.BATCH_CLIENT_DIRECT_PORT_END.bindings]]
overlay = "base.runtime"
prompt_order = 170
prompt = true
applicable_when_all = ["mode:batch_client"]

[[vars.BATCH_CLIENT_DIRECT_PORT_END.bindings]]
overlay = "mode.batch_client"
prompt_order = 40
prompt = true
applicable_when_all = ["mode:batch_client"]

[vars.BATCH_CLIENT_EGRESS_PORT]
type = "int"
default = "30100"
secret = false
description = "Internal listen port for the api_egress container in batch mode."
examples = ["30100"]
validators = ["port"]

[[vars.BATCH_CLIENT_EGRESS_PORT.bindings]]
overlay = "base.runtime"
prompt_order = 150
prompt = true
applicable_when_all = ["mode:batch_client"]

[[vars.BATCH_CLIENT_EGRESS_PORT.bindings]]
overlay = "mode.batch_client"
prompt_order = 50
prompt = true
applicable_when_all = ["mode:batch_client"]

[[vars.BATCH_CLIENT_EGRESS_PORT.bindings]]
overlay = "feature.api_egress"
prompt_order = 90
prompt = true
applicable_when_all = ["feature:api_egress"]

[vars.SERVER_NAME]
type = "string"
default = "localhost"
secret = false
description = "Hostname used by ingress routes and generated access URLs."
examples = ["localhost", "gpt.internal.example"]
validators = ["hostname"]

[[vars.SERVER_NAME.bindings]]
overlay = "base.runtime"
prompt_order = 100
prompt = true

[vars.NGINX_ACL_ALLOW_LIST]
type = "string"
default = "allow 10.0.0.0/8; allow 172.16.0.0/12; allow 192.168.0.0/16; allow 127.0.0.1;"
secret = false
description = "Ingress IP allow-list rules (Nginx allow directives)."
examples = ["allow 127.0.0.1; allow 10.0.0.0/8; allow 172.16.0.0/12; allow 192.168.0.0/16;"]
validators = ["nginx_allow_list"]

[[vars.NGINX_ACL_ALLOW_LIST.bindings]]
overlay = "base.runtime"
prompt_order = 110
prompt = true

[vars.INGRESS_INTERNAL_IP]
type = "ip"
default = "172.16.238.11"
secret = false
description = "Static docker_internal identity for ingress."
examples = ["172.16.238.11"]
validators = ["ipv4"]

[[vars.INGRESS_INTERNAL_IP.bindings]]
overlay = "base.runtime"
prompt_order = 120
prompt = false

[vars.OPENWEBUI_DATA_DIR]
type = "path"
default = ""
secret = false
description = "Host path mounted to OpenWebUI data storage."
examples = ["/var/lib/ukbgpt/openwebui-data"]
validators = ["path"]

[[vars.OPENWEBUI_DATA_DIR.bindings]]
overlay = "mode.chatbot_provider"
prompt_order = 50
prompt = true
required_when_all = ["mode:chatbot_provider"]

[vars.OPENWEBUI_RUNTIME_UID]
type = "int"
default = ""
secret = false
description = "Runtime UID for OpenWebUI container bind-path ownership alignment."
examples = ["1000"]
validators = ["positive_int"]

[[vars.OPENWEBUI_RUNTIME_UID.bindings]]
overlay = "mode.chatbot_provider"
prompt_order = 60
prompt = false
applicable_when_all = ["mode:chatbot_provider"]

[vars.OPENWEBUI_RUNTIME_GID]
type = "int"
default = ""
secret = false
description = "Runtime GID for OpenWebUI container bind-path ownership alignment."
examples = ["1000"]
validators = ["positive_int"]

[[vars.OPENWEBUI_RUNTIME_GID.bindings]]
overlay = "mode.chatbot_provider"
prompt_order = 70
prompt = false
applicable_when_all = ["mode:chatbot_provider"]

[vars.OPENWEBUI_PIPELINES_API_KEY]
type = "string"
default = ""
secret = true
description = "Optional internal API key override for the bundled OpenWebUI Pipelines service."
examples = ["$(openssl rand -hex 16)"]

[[vars.OPENWEBUI_PIPELINES_API_KEY.bindings]]
overlay = "feature.rate_limiting"
prompt_order = 75
prompt = false
applicable_when_all = ["feature:rate_limiting"]

[vars.ADAPTIVE_RATE_LIMIT_METRICS_URL]
type = "string"
default = ""
secret = false
description = "Optional default metrics endpoint used by the adaptive rate-limit pipeline."
examples = ["http://worker_0:5000/metrics"]

[[vars.ADAPTIVE_RATE_LIMIT_METRICS_URL.bindings]]
overlay = "feature.rate_limiting"
prompt_order = 76
prompt = false
applicable_when_all = ["feature:rate_limiting"]

[vars.CERTIFICATE_KEY]
type = "string"
default = ""
secret = true
description = "TLS private key PEM content for ingress (chatbot provider mode)."
examples = ["$(cat /path/to/server.key)"]
validators = ["pem_private_key"]

[[vars.CERTIFICATE_KEY.bindings]]
overlay = "mode.chatbot_provider"
prompt_order = 20
prompt = false
required_when_all = ["mode:chatbot_provider"]

[vars.SSL_CERT_PATH]
type = "path"
default = ""
secret = false
description = "Absolute host path to PEM certificate chain (fullchain)."
examples = ["/path/to/fullchain.pem"]
validators = ["file", "pem_certificate"]

[[vars.SSL_CERT_PATH.bindings]]
overlay = "mode.chatbot_provider"
prompt_order = 30
prompt = true
required_when_all = ["mode:chatbot_provider"]
description = "Absolute host path to the ingress TLS fullchain PEM (leaf + intermediates). Testing only: run `python3 utils/scripts/create_localhost_pki.py` and use `~/.ukbgpt-localhost-pki/fullchain.pem`."
examples = ["/home/your-user/.ukbgpt-localhost-pki/fullchain.pem"]

[vars.WEBUI_SECRET_KEY]
type = "string"
default = ""
secret = true
description = "OpenWebUI application secret key."
examples = ["$(openssl rand -hex 32)"]
validators = ["non_empty"]

[[vars.WEBUI_SECRET_KEY.bindings]]
overlay = "mode.chatbot_provider"
prompt_order = 40
prompt = false
required_when_all = ["mode:chatbot_provider"]

[vars.ENABLE_API_KEYS]
type = "bool"
default = "1"
secret = false
description = "Allow in general OpenWebUI API key usage."
examples = ["1", "0"]
validators = ["bool"]

[[vars.ENABLE_API_KEYS.bindings]]
overlay = "mode.chatbot_provider"
prompt_order = 80
prompt = true
applicable_when_all = ["mode:chatbot_provider"]

[vars.USER_PERMISSIONS_FEATURES_API_KEYS]
type = "bool"
default = "1"
secret = false
description = "Allow also default users OpenWebUI API key usage."
examples = ["1", "0"]
validators = ["bool"]

[[vars.USER_PERMISSIONS_FEATURES_API_KEYS.bindings]]
overlay = "mode.chatbot_provider"
prompt_order = 90
prompt = true
applicable_when_all = ["mode:chatbot_provider"]

[vars.ROOT_CA_PATH]
type = "path"
default = ""
secret = false
description = "Host path to corporate Root CA PEM used for outbound TLS verification."
examples = ["/path/to/corporate_root_ca.pem"]
validators = ["file"]

[[vars.ROOT_CA_PATH.bindings]]
overlay = "base.runtime"
prompt_order = 260
prompt = true
applicable_when_any = ["feature:ldap", "feature:api_egress"]
required_when_any = ["feature:ldap", "feature:api_egress"]
description = "Corporate Root CA PEM path used to verify TLS to pinned LDAP/API egress upstreams. Required when LDAP or API egress is enabled."
examples = ["/etc/ssl/certs/corp-root-ca.pem"]

[[vars.ROOT_CA_PATH.bindings]]
overlay = "feature.api_egress"
prompt_order = 20
prompt = true
required_when_all = ["feature:api_egress"]
description = "Root CA PEM used by api_egress to verify TLS for pinned additional API upstreams. Testing only: run `python3 utils/scripts/create_localhost_pki.py` and use `~/.ukbgpt-localhost-pki/root_ca.crt`."
examples = ["/home/your-user/.ukbgpt-localhost-pki/root_ca.crt"]

[[vars.ROOT_CA_PATH.bindings]]
overlay = "feature.ldap"
prompt_order = 40
prompt = true
required_when_all = ["feature:ldap"]
description = "Root CA PEM used by the LDAP egress proxy to validate upstream LDAPS certificates. Testing only: run `python3 utils/scripts/create_localhost_pki.py` and use `~/.ukbgpt-localhost-pki/root_ca.crt`."
examples = ["/home/your-user/.ukbgpt-localhost-pki/root_ca.crt"]

[vars.MODEL_DEPLOYMENT_CONFIG]
type = "string"
default = ""
secret = false
description = "Primary LLM model deployment config path (repo-relative or absolute)."
examples = ["examples/model_deployments/gpt-oss-120b.1x8.toml"]
validators = []

[vars.GPT_OSS_ENCODINGS_PATH]
type = "path"
default = ""
secret = false
description = "Host directory containing pre-downloaded Harmony encodings for gpt-oss profiles."
examples = ["/path/to/pre-downloaded/harmony/encodings"]
validators = ["directory"]

[vars.HF_HOME]
type = "path"
default = "~/.cache/huggingface"
secret = false
description = "Host Hugging Face cache directory containing pre-downloaded model artifacts. The stack runs offline; download models into this directory before startup, for example with `hf download <model_id> --cache-dir \"$HF_HOME\"`."
examples = ["~/.cache/huggingface", "/mnt/.cache/huggingface"]
validators = ["path"]

[[vars.HF_HOME.bindings]]
overlay = "base.runtime"
prompt_order = 265
prompt = true

[vars.VLLM_OPENAI_IMAGE]
type = "string"
default = ""
secret = false
description = "Global fallback worker image for LLM, embedding, STT, and TTS backends."
examples = ["vllm/vllm-openai:v0.14.0"]
validators = []

[vars.VLLM_OPENAI_IMAGE_LLM]
type = "string"
default = ""
secret = false
description = "Worker image override for primary LLM backend."
examples = ["vllm/vllm-openai:v0.14.0"]
validators = []

[vars.VLLM_OPENAI_IMAGE_EMBEDDING]
type = "string"
default = ""
secret = false
description = "Worker image override for embedding backend."
examples = ["vllm/vllm-openai:v0.14.0"]
validators = []

[vars.VLLM_OPENAI_IMAGE_STT]
type = "string"
default = ""
secret = false
description = "Worker image override for STT backend."
examples = ["vllm/vllm-openai:nightly"]
validators = []

[vars.VLLM_OPENAI_IMAGE_TTS]
type = "string"
default = ""
secret = false
description = "Worker image override for TTS backend."
examples = ["vllm/vllm-omni:v0.18.0"]
validators = []

[vars.VLLM_LLM_MAX_MODEL_LEN]
type = "string"
default = ""
secret = false
description = "Optional override for LLM max model length."
examples = ["262144"]
validators = []

[vars.VLLM_LLM_GPU_MEMORY_UTILIZATION]
type = "string"
default = ""
secret = false
description = "Optional override for LLM GPU memory utilization fraction in selected LLM profiles."
examples = ["0.30"]
validators = []

[vars.VLLM_EMBEDDING_GPU_MEMORY_UTILIZATION]
type = "string"
default = ""
secret = false
description = "Optional override for embedding GPU memory utilization fraction."
examples = ["0.90"]
validators = []

[vars.VLLM_EMBEDDING_MAX_MODEL_LEN]
type = "string"
default = ""
secret = false
description = "Optional override for embedding max model length."
examples = ["32000"]
validators = []

[vars.VLLM_STT_EXTRA_PIP_PACKAGES]
type = "string"
default = ""
secret = false
description = "Optional extra pip packages baked into STT worker image build."
examples = ["soxr librosa soundfile mistral_common>=1.9.0"]
validators = []

[vars.VLLM_STT_LD_PRELOAD]
type = "string"
default = ""
secret = false
description = "Optional LD_PRELOAD override for STT workers."
examples = ["/usr/lib/x86_64-linux-gnu/libjemalloc.so.2"]
validators = []

[vars.VLLM_STT_GPU_MEMORY_UTILIZATION]
type = "string"
default = ""
secret = false
description = "Optional override for STT GPU memory utilization fraction."
examples = ["0.70"]
validators = []

[vars.VLLM_STT_MAX_MODEL_LEN]
type = "string"
default = ""
secret = false
description = "Optional override for STT max model length."
examples = ["131072"]
validators = []

[vars.VLLM_TTS_GPU_MEMORY_UTILIZATION]
type = "string"
default = ""
secret = false
description = "Optional override for TTS GPU memory utilization fraction."
examples = ["0.80"]
validators = []

[vars.NGINX_BACKEND_ROUTER_IMAGE]
type = "string"
default = "nginx:1.25-alpine"
secret = false
description = "Image pin for backend router service used in multi-worker topologies."
examples = ["nginx:1.25-alpine"]
validators = []

[vars.BACKEND_ROUTER_INTERNAL_IP]
type = "ip"
default = "172.16.238.20"
secret = false
description = "Static docker_internal identity for backend_router."
examples = ["172.16.238.20"]
validators = ["ipv4"]

[vars.ENABLE_INTERNAL_METRICS]
type = "bool"
default = "false"
secret = false
description = "Enable exporter + Prometheus + Grafana overlays."
examples = ["true", "false"]
validators = ["bool"]

[[vars.ENABLE_INTERNAL_METRICS.bindings]]
overlay = "base.runtime"
prompt_order = 180
prompt = false

[[vars.ENABLE_INTERNAL_METRICS.bindings]]
overlay = "feature.metrics"
prompt_order = 10
prompt = false
required_when_all = ["feature:metrics"]

[vars.ENABLE_METRICS_FORWARDING]
type = "bool"
default = "false"
secret = false
description = "Expose localhost scrape tunnels for ingress/worker metrics."
examples = ["true", "false"]
validators = ["bool"]

[[vars.ENABLE_METRICS_FORWARDING.bindings]]
overlay = "base.runtime"
prompt_order = 250
prompt = true

[[vars.ENABLE_METRICS_FORWARDING.bindings]]
overlay = "feature.metrics"
prompt_order = 20
prompt = true
applicable_when_all = ["feature:metrics"]

[vars.ENABLE_LDAP]
type = "bool"
default = "false"
secret = false
description = "Enable LDAP identity airlock in chatbot provider mode."
examples = ["true", "false"]
validators = ["bool"]

[[vars.ENABLE_LDAP.bindings]]
overlay = "base.runtime"
prompt_order = 190
prompt = false

[[vars.ENABLE_LDAP.bindings]]
overlay = "feature.ldap"
prompt_order = 10
prompt = false
required_when_all = ["feature:ldap"]

[vars.LDAP_TARGET_IP]
type = "ip"
default = ""
secret = false
description = "Pinned RFC1918 private IPv4 of upstream LDAP/LDAPS server."
examples = ["10.20.30.40"]
validators = ["rfc1918_ipv4"]

[[vars.LDAP_TARGET_IP.bindings]]
overlay = "feature.ldap"
prompt_order = 20
prompt = true
required_when_all = ["feature:ldap"]
description = "Pinned private IPv4 address of the LDAP/LDAPS directory server reachable via the DMZ airlock."
examples = ["10.20.30.40"]

[vars.LDAP_TARGET_SNI]
type = "string"
default = ""
secret = false
description = "TLS SNI hostname expected by the LDAP server certificate."
examples = ["dc01.corp.local"]
validators = ["hostname"]

[[vars.LDAP_TARGET_SNI.bindings]]
overlay = "feature.ldap"
prompt_order = 30
prompt = true
required_when_all = ["feature:ldap"]
description = "SNI hostname expected by the LDAP server certificate during TLS verification."
examples = ["dc01.corp.local"]

[vars.LDAP_APP_PASSWORD]
type = "string"
default = ""
secret = true
description = "LDAP bind account password used by OpenWebUI."
examples = ["<service-account-password>"]
validators = ["non_empty"]

[[vars.LDAP_APP_PASSWORD.bindings]]
overlay = "feature.ldap"
prompt_order = 50
prompt = false
required_when_all = ["feature:ldap"]

[vars.LDAP_SERVER_LABEL]
type = "string"
default = "LDAP"
secret = false
description = "Label shown on the frontend LDAP login option."
examples = ["Corporate AD"]
validators = ["non_empty"]

[[vars.LDAP_SERVER_LABEL.bindings]]
overlay = "feature.ldap"
prompt_order = 60
prompt = true
applicable_when_all = ["feature:ldap"]
description = "Human-readable label shown on the OpenWebUI login screen for LDAP sign-in."
examples = ["Corporate LDAP"]

[vars.LDAP_APP_DN]
type = "string"
default = ""
secret = false
description = "LDAP bind DN for the service account."
examples = ["cn=admin,dc=example,dc=org"]
validators = []

[[vars.LDAP_APP_DN.bindings]]
overlay = "feature.ldap"
prompt_order = 70
prompt = true
applicable_when_all = ["feature:ldap"]

[vars.LDAP_SEARCH_BASE]
type = "string"
default = ""
secret = false
description = "LDAP search base used for user lookup."
examples = ["OU=Users,DC=corp,DC=local"]
validators = []

[[vars.LDAP_SEARCH_BASE.bindings]]
overlay = "feature.ldap"
prompt_order = 80
prompt = true
applicable_when_all = ["feature:ldap"]

[vars.LDAP_ATTRIBUTE_FOR_USERNAME]
type = "string"
default = "uid"
secret = false
description = "LDAP attribute mapped to username."
examples = ["uid", "sAMAccountName"]
validators = []

[[vars.LDAP_ATTRIBUTE_FOR_USERNAME.bindings]]
overlay = "feature.ldap"
prompt_order = 90
prompt = true
applicable_when_all = ["feature:ldap"]

[vars.LDAP_ATTRIBUTE_FOR_MAIL]
type = "string"
default = "mail"
secret = false
description = "LDAP attribute mapped to email."
examples = ["mail"]
validators = []

[[vars.LDAP_ATTRIBUTE_FOR_MAIL.bindings]]
overlay = "feature.ldap"
prompt_order = 100
prompt = true
applicable_when_all = ["feature:ldap"]

[vars.LDAP_SEARCH_FILTER]
type = "string"
default = ""
secret = false
description = "Additional LDAP filter expression for user search."
examples = ["(objectClass=user)"]
validators = []

[[vars.LDAP_SEARCH_FILTER.bindings]]
overlay = "feature.ldap"
prompt_order = 110
prompt = true
applicable_when_all = ["feature:ldap"]

[vars.LDAP_PROXY_CONNECT_TIMEOUT]
type = "string"
default = "5s"
secret = false
description = "LDAP airlock connect timeout."
examples = ["5s"]
validators = ["duration"]

[[vars.LDAP_PROXY_CONNECT_TIMEOUT.bindings]]
overlay = "feature.ldap"
prompt_order = 120
prompt = true
applicable_when_all = ["feature:ldap"]

[vars.LDAP_PROXY_TIMEOUT]
type = "string"
default = "20s"
secret = false
description = "LDAP airlock proxy timeout."
examples = ["20s"]
validators = ["duration"]

[[vars.LDAP_PROXY_TIMEOUT.bindings]]
overlay = "feature.ldap"
prompt_order = 130
prompt = true
applicable_when_all = ["feature:ldap"]

[vars.ENABLE_CHAT_PURGER]
type = "bool"
default = "false"
secret = false
description = "Enable chat retention purger sidecar in chatbot provider mode."
examples = ["true", "false"]
validators = ["bool"]

[[vars.ENABLE_CHAT_PURGER.bindings]]
overlay = "base.runtime"
prompt_order = 200
prompt = false

[[vars.ENABLE_CHAT_PURGER.bindings]]
overlay = "feature.chat_purger"
prompt_order = 10
prompt = false
required_when_all = ["feature:chat_purger"]

[vars.ENABLE_RATE_LIMITING]
type = "bool"
default = "false"
secret = false
description = "Enable the OpenWebUI Pipelines sidecar and adaptive/static rate limiting in chatbot provider mode."
examples = ["true", "false"]
validators = ["bool"]

[[vars.ENABLE_RATE_LIMITING.bindings]]
overlay = "base.runtime"
prompt_order = 205
prompt = false

[[vars.ENABLE_RATE_LIMITING.bindings]]
overlay = "feature.rate_limiting"
prompt_order = 10
prompt = false
required_when_all = ["feature:rate_limiting"]

[vars.CHAT_HISTORY_RETENTION_DAYS]
type = "int"
default = "180"
secret = false
description = "Retention horizon in days for local OpenWebUI chat records."
examples = ["180"]
validators = ["positive_int"]

[[vars.CHAT_HISTORY_RETENTION_DAYS.bindings]]
overlay = "feature.chat_purger"
prompt_order = 20
prompt = true
applicable_when_all = ["feature:chat_purger"]
required_when_all = ["feature:chat_purger"]

[vars.CHAT_HISTORY_PURGE_INTERVAL_SECONDS]
type = "int"
default = "86400"
secret = false
description = "Interval between chat purge executions in seconds."
examples = ["86400"]
validators = ["positive_int"]

[[vars.CHAT_HISTORY_PURGE_INTERVAL_SECONDS.bindings]]
overlay = "feature.chat_purger"
prompt_order = 30
prompt = true
applicable_when_all = ["feature:chat_purger"]
required_when_all = ["feature:chat_purger"]

[vars.ENABLE_API_EGRESS]
type = "bool"
default = "false"
secret = false
description = "Enable pinned batch API egress feature."
examples = ["true", "false"]
validators = ["bool"]

[[vars.ENABLE_API_EGRESS.bindings]]
overlay = "base.runtime"
prompt_order = 210
prompt = false

[[vars.ENABLE_API_EGRESS.bindings]]
overlay = "feature.api_egress"
prompt_order = 10
prompt = false
required_when_all = ["feature:api_egress"]

[vars.BATCH_CLIENT_MODE_ADDITIONAL_LOCAL_API_ADDRESS]
type = "url"
default = ""
secret = false
description = "Origin-only HTTPS address for additional upstream LLM API."
examples = ["https://gpt.ukb.intern"]
validators = ["https_origin"]

[[vars.BATCH_CLIENT_MODE_ADDITIONAL_LOCAL_API_ADDRESS.bindings]]
overlay = "feature.api_egress"
prompt_order = 30
prompt = true
applicable_when_all = ["feature:api_egress"]
description = "HTTPS origin of the additional LLM API endpoint reachable through api_egress."
examples = ["https://gpt.ukb.intern"]

[vars.BATCH_CLIENT_MODE_ADDITIONAL_LOCAL_API_IP]
type = "ip"
default = ""
secret = false
description = "Pinned RFC1918 private IPv4 for additional upstream LLM API."
examples = ["10.20.24.206"]
validators = ["rfc1918_ipv4"]

[[vars.BATCH_CLIENT_MODE_ADDITIONAL_LOCAL_API_IP.bindings]]
overlay = "feature.api_egress"
prompt_order = 40
prompt = true
applicable_when_all = ["feature:api_egress"]
description = "Pinned private IPv4 for the additional LLM API origin."
examples = ["10.20.24.206"]

[vars.BATCH_CLIENT_MODE_ADDITIONAL_LOCAL_API_SNI]
type = "string"
default = ""
secret = false
description = "Optional explicit TLS SNI hostname for additional upstream LLM API."
examples = ["gpt.corp.internal"]
validators = ["hostname"]

[[vars.BATCH_CLIENT_MODE_ADDITIONAL_LOCAL_API_SNI.bindings]]
overlay = "feature.api_egress"
prompt_order = 50
prompt = true
applicable_when_all = ["feature:api_egress"]

[vars.BATCH_CLIENT_MODE_ADDITIONAL_LOCAL_EMBEDDING_API_ADDRESS]
type = "url"
default = ""
secret = false
description = "Origin-only HTTPS address for additional upstream embedding API."
