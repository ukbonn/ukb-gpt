[pytest]
addopts = -ra
testpaths = tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S
markers =
    integration: Full-stack integration tests using the real docker compose stack
    isolation: Host/container isolation and security boundary tests
    chatbot_provider: Tests that run against the chatbot provider stack
    batch_client: Tests that run against the batch client stack
    destructive: Tests that intentionally disrupt/kill containers
    requires_root: Tests that require root privileges (iptables/nsenter)
    slow: Tests that are slow to run
