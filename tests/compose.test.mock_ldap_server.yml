services:
  # ============================================================================
  # MOCK LDAP SERVER (Simulated Intranet)
  # ============================================================================
  # Represents a corporate server on a separate VLAN/Subnet.
  mock_ldap_server:
    image: alpine:latest
    container_name: ukbgpt_mock_ldap
    # 1. Mount the test certificates (generated by run_integration_tests.sh)
    #    We use the absolute path exported by the test script to find the temp artifacts.
    volumes:
      - ${TEST_ARTIFACTS_PATH:?err}/test_server.crt:/server.crt
      - ${TEST_ARTIFACTS_PATH:?err}/test_server.key:/server.key
    
    # 2. Use OPENSSL-LISTEN to support the LDAPS handshake from the proxy.
    #    verify=0 allows the connection without requiring a client cert from the proxy.
    command: /bin/sh -c "apk add --no-cache socat openssl && socat OPENSSL-LISTEN:636,cert=/server.crt,key=/server.key,verify=0,fork EXEC:'echo LDAP_PONG'"

    # Add Healthcheck to signal when packages are installed and port is open
    healthcheck:
      test: ["CMD-SHELL", "netstat -ltn | grep :636 || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30
    networks:
      simulated_intranet:
        ipv4_address: 172.20.0.5

networks:
  # A separate network representing the Corporate Intranet.
  # Traffic MUST be routed via the Host Kernel to reach here.
  simulated_intranet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
